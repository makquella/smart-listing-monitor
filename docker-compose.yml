services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parset-monitor
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      PYTHON_BIN: python
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
